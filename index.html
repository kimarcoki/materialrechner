<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Produktions-App</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f4f4f9; --text: #333; --dark: #1e293b; --success: #22c55e; }
        /* auto-bump this on every push */
        :root { --app-version: "v1.6.5"; }
        
        html, body { 
            position: relative; height: 100%; overflow-x: hidden; overflow-y: auto;
            background-color: var(--bg); margin: 0; color: var(--text); -webkit-overflow-scrolling: touch;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; }

        #sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100%; background: var(--dark); color: white; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; transition: 0.3s; z-index: 1000; }
        #sidebar.open { left: 0; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 8px; color: #94a3b8; }
        .nav-item.active { background: var(--primary); color: white; }

        #main { flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; touch-action: pan-y; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 900; }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 92%; max-width: 480px; position: relative; margin: 20px auto; box-sizing: border-box; }
        .card.wide { max-width: 1000px; margin-top: 50px; }

        .sidebar-version { margin-top: 12px; font-size: 12px; color: #94a3b8; text-align: right; user-select: none; }
        .sidebar-version::before { content: var(--app-version); }
        
        .card-header { display: flex; align-items: center; justify-content: center; margin-bottom: 25px; position: relative; min-height: 45px; }
        .menu-btn { position: absolute; left: 0; background: var(--dark); color: white; border: none; padding: 12px 16px; border-radius: 8px; cursor: pointer; font-size: 20px; }

        #app-content { display: none; width: 100%; flex-direction: column; align-items: center; }
        .view-section { display: none; width: 100%; }
        .view-section.active { display: block; }

        label { display: block; margin-bottom: 4px; font-weight: bold; color: #555; font-size: 10px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; 
            box-sizing: border-box; font-size: 16px; text-align: center; background: white;
        }
        
        input:disabled { background: #f8fafc; color: #64748b; border: 1px dashed #cbd5e1; }
        button.primary-btn { width: 100%; padding: 15px; background-color: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; }

        .m-row { display: grid; grid-template-columns: 100px 1fr 1fr 1.2fr 1fr 2.2fr; gap: 10px; align-items: end; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .m-name { font-weight: bold; font-size: 13px; padding-bottom: 12px; }
        .m-col { display: flex; flex-direction: column; align-items: center; }
        .m-res { font-size: 11px; font-weight: bold; color: var(--primary); text-align: right; width: 100%; white-space: nowrap; }
        .progress-bar { position: relative; height: 16px; background: #e2e8f0; border-radius: 8px; margin-top: 4px; overflow: hidden; border: 1px solid #cbd5e1; width: 100%; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.4s; }
        .progress-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #0f172a; text-shadow: 0 1px 0 rgba(255,255,255,0.6); pointer-events: none; }

        @media (max-width: 850px) {
            .m-row { grid-template-columns: 1fr 1fr; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
            .m-name { grid-column: span 2; text-align: center; border-bottom: 1px solid #e2e8f0; margin-bottom: 10px; font-size: 16px; }
            .m-res-wrapper { grid-column: span 2; margin-top: 8px; }
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .result-box { margin-top: 15px; padding: 15px; background: #eef2ff; border-radius: 10px; border-left: 5px solid var(--primary); }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; }
        .unit { font-weight: bold; color: var(--primary); }
        .color-detail { font-size: 14px; color: #444; padding-left: 10px; border-left: 2px solid #cbd5e1; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div id="overlay" onclick="toggleSidebar()"></div>
    <nav id="sidebar">
        <h3 style="border-bottom: 1px solid #334155; padding-bottom: 10px;">Menü</h3>
        <div id="nav-hallen" class="nav-item active" onclick="switchView('hallen')">Produktion-Übersicht</div>
        <div id="nav-material" class="nav-item" onclick="switchView('material')">Material-Rechner</div>
        <div id="nav-zyklus" class="nav-item" onclick="switchView('zyklus')">Zyklus-Rechner</div>
        <div style="margin-top: auto;">
            <div class="sidebar-version"></div>
            <button class="primary-btn" onclick="location.reload()" style="background: #ef4444;">Abmelden</button>
        </div>
    </nav>

    <div id="main">
        <div id="login-screen" class="card">
            <h2 style="text-align: center;">🔒 Login</h2>
            <input type="password" id="passInput" placeholder="Passwort...">
            <button class="primary-btn" onclick="checkPassword()">Anmelden</button>
            <p id="error" style="color: #ef4444; display: none; text-align: center; margin-top: 10px;">Falsch!</p>
        </div>

        <div id="app-content">
            <div id="view-hallen" class="view-section active">
                <div class="card wide">
                    <div class="card-header"><button class="menu-btn" onclick="toggleSidebar()">☰</button><h2 style="margin:0">Produktion-Übersicht</h2></div>
                    <div id="maschinen-liste"></div>
                </div>
            </div>

            <div id="view-material" class="view-section">
                <div class="card">
                    <div class="card-header"><button class="menu-btn" onclick="toggleSidebar()">☰</button><h2 style="margin:0">Material</h2></div>
                    <label>Stückzahl</label><input type="number" id="stueck" oninput="calculateMaterial()">
                    <label>Gewicht (g)</label><input type="number" id="gewichtG" step="0.1" oninput="calculateMaterial()">
                    <div class="grid">
                        <div><label>Links (%)</label><input type="number" id="pLinks" oninput="calculateMaterial()"></div>
                        <div><label>Rechts (%)</label><input type="number" id="pRechts" disabled></div>
                    </div>
                    <label>Farbe (%) gesamt</label><input type="number" id="farbeProzent" step="0.1" oninput="calculateMaterial()">
                    <label>Farbmischung (Teile)</label>
                    <div class="grid-4">
                        <div><label style="text-align:center">F1</label><input type="number" id="f1" oninput="calculateMaterial()"></div>
                        <div><label style="text-align:center">F2</label><input type="number" id="f2" oninput="calculateMaterial()"></div>
                        <div><label style="text-align:center">F3</label><input type="number" id="f3" oninput="calculateMaterial()"></div>
                        <div><label style="text-align:center">F4</label><input type="number" id="f4" oninput="calculateMaterial()"></div>
                    </div>
                    <div class="result-box">
                        <div class="result-item"><span>Gesamt:</span><span class="unit" id="resGesamt">0,00 kg</span></div>
                        <div class="result-item"><span>Links:</span><span class="unit" id="resLinks">0,00 kg</span></div>
                        <div class="result-item"><span>Rechts:</span><span class="unit" id="resRechts">0,00 kg</span></div>
                        <hr style="border:0; border-top:1px solid #cbd5e1; margin:10px 0;">
                        <div class="result-item"><span>Farbe gesamt:</span><span class="unit" id="resFarbeGes">0,00 kg</span></div>
                        <div id="farbeEinzelbereich"></div>
                    </div>
                </div>
            </div>

            <div id="view-zyklus" class="view-section">
                <div class="card">
                    <div class="card-header"><button class="menu-btn" onclick="toggleSidebar()">☰</button><h2 style="margin:0">Zyklus</h2></div>
                    <label>Stück gesamt</label><input type="number" id="zykStueck" oninput="calculateZyklus()">
                    <label>Zykluszeit (s)</label><input type="number" id="zykZeit" step="0.1" oninput="calculateZyklus()">
                    <div class="grid">
                        <div><label>Ist (Zettel)</label><input type="number" id="zykZettel" oninput="calculateZyklus()"></div>
                        <div><label>Stk/Pal</label><input type="number" id="zykProPalette" oninput="calculateZyklus()"></div>
                    </div>
                    <div class="result-box">
                        <div class="result-item"><span>Teile/h:</span><span class="unit" id="resZykStunde">0 Stk.</span></div>
                        <div class="result-item"><span>Restlaufzeit:</span><span class="unit" id="resZykDauer">0m</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MEIN_PASSWORT = "nucfov-temsut-1Bevka";
        let hData = JSON.parse(localStorage.getItem('hDataV163')) || JSON.parse(localStorage.getItem('hData')) || {};

        function initHalle() {
            const container = document.getElementById('maschinen-liste');
            if(!container) return; container.innerHTML = "";
            for (let i = 1; i <= 9; i++) {
                if(!hData[i]) hData[i] = { curZ: 0, p: 80, t: 25, targetStk: 10000 };
                const d = hData[i];
                const row = document.createElement('div'); row.className = 'm-row';
                row.innerHTML = `
                    <div class="m-name">Maschine ${i}</div>
                    <div class="m-col"><label>Ist (Zettel)</label><input type="number" value="${d.curZ}" oninput="updateM(${i},'curZ',this.value)"></div>
                    <div class="m-col"><label>Stk/Pal</label><input type="number" value="${d.p}" oninput="updateM(${i},'p',this.value)"></div>
                    <div class="m-col"><label>Gesamt-Ziel</label><input type="number" id="target-${i}" value="${d.targetStk}" oninput="updateM(${i},'targetStk',this.value)"></div>
                    <div class="m-col"><label>Zyklus (s)</label><input type="number" value="${d.t}" oninput="updateM(${i},'t',this.value)"></div>
                    <div class="m-res-wrapper">
                        <div class="m-res" id="resM${i}">0 / 0 Stk. (0%) | Rest: 0m</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="fillM${i}" style="width:0%"></div>
                            <div class="progress-text" id="pctM${i}">0%</div>
                        </div>
                    </div>`;
                container.appendChild(row); calcM(i);
            }
        }

        function updateM(id, f, v) { hData[id][f] = parseFloat(v) || 0; localStorage.setItem('hDataV163', JSON.stringify(hData)); calcM(id); }

        function calcM(id) {
            const d = hData[id]; const istStk = d.curZ * d.p; const zielStk = d.targetStk;
            const prozent = zielStk > 0 ? Math.min(100, (istStk / zielStk) * 100) : 0;
            const offen = zielStk - istStk;
            let tTxt = "0m";
            if(offen > 0 && d.t > 0) {
                const s = Math.max(0, offen * d.t);
                const ddd = Math.floor(s / 86400);
                const h = Math.floor((s % 86400) / 3600);
                const m = Math.floor((s % 3600) / 60);
                tTxt = (ddd > 0 ? ddd + "T " : "") + (h > 0 || ddd > 0 ? h + "h " : "") + m + "m";
            }
            document.getElementById(`resM${id}`).innerText = `${istStk.toLocaleString('de-DE')} / ${zielStk.toLocaleString('de-DE')} | Rest: ${tTxt}`;
            document.getElementById(`fillM${id}`).style.width = `${prozent}%`;
            const pctEl = document.getElementById(`pctM${id}`);
            if (pctEl) pctEl.innerText = `${prozent.toFixed(1)}%`;
        }

        function formatNum(v, u) { return new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(v) + " " + u; }

        function calculateMaterial() {
            const val = (id) => parseFloat(document.getElementById(id).value) || 0;
            const s = val('stueck'), g = val('gewichtG'), fP = val('farbeProzent');
            let pL = val('pLinks'); if (pL > 100) pL = 100; document.getElementById('pRechts').value = 100 - pL;
            const f1 = val('f1'), f2 = val('f2'), f3 = val('f3'), f4 = val('f4');
            
            const gesKg = (s * g) / 1000;
            const fGesKg = gesKg * (fP / 100);
            
            document.getElementById('resGesamt').innerText = formatNum(gesKg, "kg");
            document.getElementById('resLinks').innerText = formatNum(gesKg * pL / 100, "kg");
            document.getElementById('resRechts').innerText = formatNum(gesKg * (100 - pL) / 100, "kg");
            document.getElementById('resFarbeGes').innerText = fGesKg < 1 ? (Math.round(fGesKg * 1000) + " g") : formatNum(fGesKg, "kg");
            
            const eb = document.getElementById('farbeEinzelbereich'); eb.innerHTML = "";
            const gT = f1 + f2 + f3 + f4;
            if (gT > 0 && fGesKg > 0) {
                [f1, f2, f3, f4].forEach((t, i) => { if (t > 0) { 
                    const a = (fGesKg / gT) * t; 
                    eb.innerHTML += `<div class="color-detail">F${i+1}: <span class="unit">${a < 1 ? Math.round(a * 1000) + " g" : formatNum(a, "kg")}</span></div>`; 
                }});
            }
        }

        function calculateZyklus() {
            const val = (id) => parseFloat(document.getElementById(id).value) || 0;
            const s = val('zykStueck'), t = val('zykZeit'), z = val('zykZettel'), p = val('zykProPalette');
            if (t <= 0) return;
            document.getElementById('resZykStunde').innerText = Math.round(3600/t).toLocaleString('de-DE') + " Stk.";
            const restS = Math.max(0, (s - (z*p)) * t);
            const ddd = Math.floor(restS / 86400);
            const h = Math.floor((restS % 86400) / 3600);
            const m = Math.floor((restS % 3600) / 60);
            document.getElementById('resZykDauer').innerText = (ddd > 0 ? ddd + "T " : "") + (h > 0 || ddd > 0 ? h + "h " : "") + m + "m";
        }

        function switchView(v) {
            document.querySelectorAll('.view-section, .nav-item').forEach(e => e.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active'); document.getElementById('nav-' + v).classList.add('active');
            if(window.innerWidth < 850) toggleSidebar(); if(v === 'hallen') initHalle();
            window.scrollTo(0,0);
        }

        function toggleSidebar() { const sb = document.getElementById('sidebar'), ov = document.getElementById('overlay'); const open = sb.classList.toggle('open'); ov.style.display = open ? 'block' : 'none'; }
        
        function checkPassword() { if(document.getElementById('passInput').value.trim() === MEIN_PASSWORT) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('app-content').style.display = 'flex'; initHalle(); } else { document.getElementById('error').style.display = 'block'; }}
    </script>
</body>
</html>
