<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produktions-App v1.4</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f4f4f9; --text: #333; --dark: #1e293b; --success: #22c55e; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text); }
        
        .card-version { position: absolute; top: 10px; right: 15px; font-size: 10px; color: #cbd5e1; }

        #sidebar { 
            position: fixed; left: -260px; top: 0; width: 250px; height: 100%; 
            background: var(--dark); color: white; display: flex; flex-direction: column; 
            padding: 20px; box-sizing: border-box; transition: 0.3s; z-index: 1000;
            box-shadow: 4px 0 10px rgba(0,0,0,0.2);
        }
        #sidebar.open { left: 0; }
        #sidebar h3 { border-bottom: 1px solid #334155; padding-bottom: 10px; margin-top: 10px; }
        
        .nav-item { padding: 12px; cursor: pointer; border-radius: 6px; margin-bottom: 5px; transition: 0.2s; color: #94a3b8; }
        .nav-item:hover { background: #334155; color: white; }
        .nav-item.active { background: var(--primary); color: white; }

        #main { flex-grow: 1; width: 100%; height: 100%; display: flex; justify-content: center; overflow-y: auto; padding-top: 20px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 900; }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 95%; max-width: 800px; position: relative; margin-bottom: 40px; }
        .card-header { display: flex; align-items: center; justify-content: center; margin-bottom: 15px; position: relative; }
        .menu-btn { position: absolute; left: 0; background: var(--dark); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 18px; }

        #app-content { display: none; width: 100%; flex-direction: column; align-items: center; }
        .view-section { display: none; width: 100%; }
        .view-section.active { display: block; }

        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; text-align: center; width: 100%; box-sizing: border-box; }
        label { font-size: 11px; color: #64748b; font-weight: bold; display: block; margin-bottom: 2px; }

        /* Hallen-Übersicht Styles */
        .m-row { display: grid; grid-template-columns: 100px 1fr 1fr 1fr 1fr 1.5fr; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .m-name { font-weight: bold; color: var(--dark); font-size: 14px; }
        .m-res { font-size: 12px; font-weight: bold; color: var(--primary); text-align: right; }
        .progress-bar { height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); transition: 0.3s; }

        button.primary-btn { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }

        @media (max-width: 600px) {
            .m-row { grid-template-columns: 1fr 1fr; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
            .m-name { grid-column: span 2; background: #f8fafc; padding: 4px; border-radius: 4px; }
            .m-res { grid-column: span 2; text-align: left; background: #eef2ff; padding: 6px; border-radius: 4px; }
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <nav id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Menü</h3>
            <span onclick="toggleSidebar()" style="cursor:pointer; font-size: 24px;">&times;</span>
        </div>
        <div id="nav-hallen" class="nav-item active" onclick="switchView('hallen')">Hallen-Übersicht</div>
        <div id="nav-material" class="nav-item" onclick="switchView('material')">Material-Rechner</div>
        <div id="nav-zyklus" class="nav-item" onclick="switchView('zyklus')">Zyklus-Rechner</div>
        <div style="margin-top: auto;">
            <button class="primary-btn" onclick="location.reload()" style="background: #ef4444;">Abmelden</button>
        </div>
    </nav>

    <div id="main">
        <div id="login-screen" class="card" style="max-width: 400px; align-self: center;">
            <div class="card-version">v1.4</div>
            <h2 style="text-align: center; margin-top: 0;">🔒 Login</h2>
            <input type="password" id="passInput" placeholder="Passwort eingeben...">
            <button class="primary-btn" onclick="checkPassword()" style="margin-top:10px;">Anmelden</button>
            <p id="error" style="color: #ef4444; display: none; text-align: center; margin-top: 10px;">Falsches Passwort!</p>
        </div>

        <div id="app-content">
            <div id="view-hallen" class="view-section active">
                <div class="card">
                    <div class="card-version">v1.4</div>
                    <div class="card-header">
                        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                        <h2 style="margin: 0;">Hallen-Übersicht</h2>
                    </div>
                    <div id="maschinen-liste">
                        </div>
                </div>
            </div>

            <div id="view-material" class="view-section">
                <div class="card">
                    <div class="card-version">v1.4</div>
                    <div class="card-header"><button class="menu-btn" onclick="toggleSidebar()">☰</button><h2>Material-Rechner</h2></div>
                    <label>Stückzahl</label><input type="number" id="stueck" oninput="calculateMaterial()">
                    <label>Gewicht (g)</label><input type="number" id="gewichtG" oninput="calculateMaterial()">
                    <p style="text-align:center; font-size:12px; color:#94a3b8;">(Material-Felder wie in v1.3.3)</p>
                </div>
            </div>

            <div id="view-zyklus" class="view-section">
                <div class="card">
                    <div class="card-version">v1.4</div>
                    <div class="card-header"><button class="menu-btn" onclick="toggleSidebar()">☰</button><h2>Zyklus-Rechner</h2></div>
                    <label>Stückzahl</label><input type="number" id="zykStueck" oninput="calculateZyklus()">
                    <label>Zykluszeit (sek)</label><input type="number" id="zykZeit" oninput="calculateZyklus()">
                    <p style="text-align:center; font-size:12px; color:#94a3b8;">(Zyklus-Felder wie in v1.3.3)</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MEIN_PASSWORT = "nucfov-temsut-1Bevka";

        function checkPassword() {
            if(document.getElementById('passInput').value.trim() === MEIN_PASSWORT) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                initHalle();
            } else { document.getElementById('error').style.display = 'block'; }
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            const isOpen = sb.classList.toggle('open');
            ov.style.display = isOpen ? 'block' : 'none';
        }

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            document.getElementById('nav-' + view).classList.add('active');
            toggleSidebar();
        }

        // HALLEN LOGIK
        const maschinenAnzahl = 9;
        let hallenDaten = JSON.parse(localStorage.getItem('hallenDatenV14')) || {};

        function initHalle() {
            const container = document.getElementById('maschinen-liste');
            container.innerHTML = "";
            for (let i = 1; i <= maschinenAnzahl; i++) {
                const d = hallenDaten[i] || { z: 1, p: 80, s: 10000, t: 25 };
                const row = document.createElement('div');
                row.className = 'm-row';
                row.innerHTML = `
                    <div class="m-name">Maschine ${i}</div>
                    <div><label>Zettel-Nr.</label><input type="number" value="${d.z}" oninput="updateM(${i}, 'z', this.value)"></div>
                    <div><label>Stk/Pal</label><input type="number" value="${d.p}" oninput="updateM(${i}, 'p', this.value)"></div>
                    <div><label>Ziel Stk.</label><input type="number" value="${d.s}" oninput="updateM(${i}, 's', this.value)"></div>
                    <div><label>Zyklus (s)</label><input type="number" value="${d.t}" oninput="updateM(${i}, 't', this.value)"></div>
                    <div class="m-res" id="resM${i}">Berechne...</div>
                `;
                container.appendChild(row);
                calcM(i);
            }
        }

        function updateM(id, field, val) {
            if (!hallenDaten[id]) hallenDaten[id] = { z: 0, p: 0, s: 0, t: 0 };
            hallenDaten[id][field] = parseFloat(val) || 0;
            localStorage.setItem('hallenDatenV14', JSON.stringify(hallenDaten));
            calcM(id);
        }

        function calcM(id) {
            const d = hallenDaten[id];
            if (!d) return;
            const produziert = d.z * d.p;
            const offen = d.s - produziert;
            const prozent = Math.min(100, Math.max(0, (produziert / d.s) * 100)) || 0;
            
            let zeitText = "0m";
            if (offen > 0 && d.t > 0) {
                const sek = offen * d.t;
                const h = Math.floor(sek / 3600);
                const m = Math.floor((sek % 3600) / 60);
                const tage = Math.floor(h / 24);
                zeitText = (tage > 0 ? tage + "t " : "") + (h % 24) + "h " + m + "m";
            }

            document.getElementById(`resM${id}`).innerHTML = `
                <div>${prozent.toFixed(1)}% | Rest: ${zeitText}</div>
                <div class="progress-bar"><div class="progress-fill" style="width:${prozent}%"></div></div>
            `;
        }
    </script>
</body>
</html>
