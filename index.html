<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produktions-App</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f4f4f9; --text: #333; --dark: #1e293b; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text); }
        
        .card-version { position: absolute; top: 10px; right: 15px; font-size: 10px; color: #cbd5e1; font-weight: normal; }

        #sidebar { 
            position: fixed; left: -260px; top: 0; width: 250px; height: 100%; 
            background: var(--dark); color: white; display: flex; flex-direction: column; 
            padding: 20px; box-sizing: border-box; transition: 0.3s; z-index: 1000;
            box-shadow: 4px 0 10px rgba(0,0,0,0.2);
        }
        #sidebar.open { left: 0; }
        #sidebar h3 { border-bottom: 1px solid #334155; padding-bottom: 10px; margin-top: 10px; }
        
        .nav-item { padding: 12px; cursor: pointer; border-radius: 6px; margin-bottom: 5px; transition: 0.2s; color: #94a3b8; }
        .nav-item:hover { background: #334155; color: white; }
        .nav-item.active { background: var(--primary); color: white; }

        #main { flex-grow: 1; position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; overflow-y: auto; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 900; }

        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 90%; max-width: 480px; position: relative; margin: 20px auto; }
        .card-header { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; }
        .menu-btn { position: absolute; left: 0; background: var(--dark); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 18px; display: none; }

        #app-content { display: none; width: 100%; flex-direction: column; align-items: center; }
        .view-section { display: none; width: 100%; max-width: 480px; }
        .view-section.active { display: block; }

        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 13px; }
        .label-center { text-align: center; display: block; width: 100%; margin-bottom: 3px; }

        input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; text-align: center; }
        input:disabled { background-color: #f0f0f0; color: #888; }
        
        button.primary-btn { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        
        .result-box { margin-top: 15px; padding: 15px; background: #eef2ff; border-radius: 8px; border-left: 5px solid var(--primary); }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; }
        .unit { font-weight: bold; color: var(--primary); }
        hr { border: 0; border-top: 1px solid #cbd5e1; margin: 8px 0; }
        .color-detail { font-size: 14px; color: #444; padding-left: 10px; border-left: 2px solid #cbd5e1; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <nav id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Menü</h3>
            <span onclick="toggleSidebar()" style="cursor:pointer; font-size: 24px;">&times;</span>
        </div>
        <div id="nav-material" class="nav-item active" onclick="switchView('material')">Material-Rechner</div>
        <div id="nav-zyklus" class="nav-item" onclick="switchView('zyklus')">Zyklus-Rechner</div>
        <div style="margin-top: auto;">
            <button class="primary-btn" onclick="location.reload()" style="background: #ef4444;">Abmelden</button>
        </div>
    </nav>

    <div id="main">
        <div id="login-screen" class="card">
            <div class="card-version">v1.3.1</div>
            <h2 style="text-align: center; margin-top: 0;">🔒 Login</h2>
            <input type="password" id="passInput" placeholder="Passwort eingeben...">
            <button class="primary-btn" onclick="checkPassword()">Anmelden</button>
            <p id="error" style="color: #ef4444; display: none; text-align: center; margin-top: 10px;">Falsches Passwort!</p>
        </div>

        <div id="app-content">
            <div id="view-material" class="view-section active">
                <div class="card">
                    <div class="card-version">v1.3.1</div>
                    <div class="card-header">
                        <button class="menu-btn" style="display:block" onclick="toggleSidebar()">☰</button>
                        <h2 style="margin: 0;">Material-Rechner</h2>
                    </div>

                    <label>Geplante Stückzahl (Stk.)</label>
                    <input type="number" id="stueck" oninput="calculateMaterial()">
                    
                    <label>Gewicht pro Stück (Gramm)</label>
                    <input type="number" id="gewichtG" step="0.1" oninput="calculateMaterial()">
                    
                    <div class="grid">
                        <div><label>Links (%)</label><input type="number" id="pLinks" oninput="calculateMaterial()"></div>
                        <div><label>Rechts (%)</label><input type="number" id="pRechts" disabled></div>
                    </div>
                    
                    <label>Farbe / Additiv (%) gesamt</label>
                    <input type="number" id="farbeProzent" step="0.1" oninput="calculateMaterial()">

                    <label style="margin-bottom: 10px;">Farbmischung (Teile pro Farbe)</label>
                    <div class="grid-4">
                        <div><label class="label-center">F1</label><input type="number" id="f1" oninput="calculateMaterial()"></div>
                        <div><label class="label-center">F2</label><input type="number" id="f2" oninput="calculateMaterial()"></div>
                        <div><label class="label-center">F3</label><input type="number" id="f3" oninput="calculateMaterial()"></div>
                        <div><label class="label-center">F4</label><input type="number" id="f4" oninput="calculateMaterial()"></div>
                    </div>
                    
                    <div class="result-box">
                        <div class="result-item"><span>Gesamtbedarf:</span><span class="unit" id="resGesamt">0,00 kg</span></div>
                        <hr>
                        <div class="result-item"><span>Anteil LINKS:</span><span class="unit" id="resLinks">0,00 kg</span></div>
                        <div class="result-item"><span>Anteil RECHTS:</span><span class="unit" id="resRechts">0,00 kg</span></div>
                        <hr>
                        <div class="result-item"><span>Farbe gesamt:</span><span class="unit" id="resFarbeGes">0,00 kg</span></div>
                        <div id="farbeEinzelbereich"></div>
                    </div>
                </div>
            </div>

            <div id="view-zyklus" class="view-section">
                <div class="card">
                    <div class="card-version">v1.3.1</div>
                    <div class="card-header">
                        <button class="menu-btn" style="display:block" onclick="toggleSidebar()">☰</button>
                        <h2 style="margin: 0;">Zyklus-Rechner</h2>
                    </div>

                    <label>Geplante Stückzahl (Stk.)</label>
                    <input type="number" id="zykStueck" oninput="calculateZyklus()">
                    
                    <label>Zykluszeit (Sekunden)</label>
                    <input type="number" id="zykZeit" step="0.1" oninput="calculateZyklus()">
                    
                    <label>Kavitäten (Nestzahl)</label>
                    <input type="number" id="zykNest" value="1" oninput="calculateZyklus()">

                    <div class="result-box">
                        <div class="result-item"><span>Teile pro Stunde:</span><span class="unit" id="resZykStunde">0 Stk.</span></div>
                        <hr>
                        <div class="result-item"><span>Laufzeit gesamt:</span><span class="unit" id="resZykDauer" style="text-align:right">0 Min.</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MEIN_PASSWORT = "nucfov-temsut-1Bevka";

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('view-' + view).classList.add('active');
            document.getElementById('nav-' + view).classList.add('active');
            toggleSidebar();
            
            if(view === 'material') calculateMaterial();
            if(view === 'zyklus') calculateZyklus();
        }

        function loadSavedValues() {
            const savedMat = localStorage.getItem('materialDataV13');
            if (savedMat) {
                const data = JSON.parse(savedMat);
                document.getElementById('stueck').value = data.stueck;
                document.getElementById('gewichtG').value = data.gewichtG;
                document.getElementById('pLinks').value = data.pLinks;
                document.getElementById('farbeProzent').value = data.farbeProzent;
                document.getElementById('f1').value = data.f1; document.getElementById('f2').value = data.f2;
                document.getElementById('f3').value = data.f3; document.getElementById('f4').value = data.f4;
            }

            const savedZyk = localStorage.getItem('zyklusDataV13');
            if (savedZyk) {
                const data = JSON.parse(savedZyk);
                document.getElementById('zykStueck').value = data.stueck;
                document.getElementById('zykZeit').value = data.zeit;
                document.getElementById('zykNest').value = data.nest;
            }
        }

        function checkPassword() {
            if(document.getElementById('passInput').value.trim() === MEIN_PASSWORT) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                loadSavedValues();
                calculateMaterial();
                calculateZyklus();
            } else { document.getElementById('error').style.display = 'block'; }
        }

        document.getElementById('passInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPassword(); });

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            const isOpen = sb.classList.toggle('open');
            ov.style.display = isOpen ? 'block' : 'none';
        }

        function formatNum(value, unit) {
            const formatted = new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(value);
            return `${formatted} ${unit}`;
        }

        function calculateMaterial() {
            const val = (id) => parseFloat(document.getElementById(id).value) || 0;
            const stueck = val('stueck'), gewichtG = val('gewichtG');
            let pL = val('pLinks');
            if (pL > 100) pL = 100; if (pL < 0) pL = 0;
            document.getElementById('pRechts').value = 100 - pL;
            const farbeP = val('farbeProzent');
            const f1 = val('f1'), f2 = val('f2'), f3 = val('f3'), f4 = val('f4');

            localStorage.setItem('materialDataV13', JSON.stringify({ stueck, gewichtG, pLinks: pL, farbeProzent: farbeP, f1, f2, f3, f4 }));

            const gesamtKg = (stueck * gewichtG) / 1000;
            const farbeGesamtKg = gesamtKg * (farbeP / 100);

            document.getElementById('resGesamt').innerText = formatNum(gesamtKg, "kg");
            document.getElementById('resLinks').innerText = formatNum(gesamtKg * pL / 100, "kg");
            document.getElementById('resRechts').innerText = formatNum(gesamtKg * (100-pL) / 100, "kg");
            
            let fVal = "0,00 kg";
            if (farbeGesamtKg > 0) {
                fVal = farbeGesamtKg < 1 ? (new Intl.NumberFormat('de-DE', { maximumFractionDigits: 1 }).format(farbeGesamtKg * 1000) + " g") : formatNum(farbeGesamtKg, "kg");
            }
            document.getElementById('resFarbeGes').innerText = fVal;

            const gesamtTeile = f1 + f2 + f3 + f4;
            const einzelBereich = document.getElementById('farbeEinzelbereich');
            einzelBereich.innerHTML = "";
            if (gesamtTeile > 0 && farbeGesamtKg > 0) {
                [f1, f2, f3, f4].forEach((teile, i) => {
                    if (teile > 0) {
                        const anteil = (farbeGesamtKg / gesamtTeile) * teile;
                        let aTxt = anteil < 1 ? (new Intl.NumberFormat('de-DE', { maximumFractionDigits: 1 }).format(anteil * 1000) + " g") : formatNum(anteil, "kg");
                        einzelBereich.innerHTML += `<div class="color-detail">Farbe ${i+1} (${teile} T.): <span class="unit">${aTxt}</span></div>`;
                    }
                });
            }
        }

        function calculateZyklus() {
            const val = (id) => parseFloat(document.getElementById(id).value) || 0;
            const stueck = val('zykStueck'), zeit = val('zykZeit'), nest = val('zykNest');

            localStorage.setItem('zyklusDataV13', JSON.stringify({ stueck, zeit, nest }));

            if (zeit <= 0 || nest <= 0) {
                document.getElementById('resZykStunde').innerText = "0 Stk.";
                document.getElementById('resZykDauer').innerText = "0 Min.";
                return;
            }

            const teileProStunde = (3600 / zeit) * nest;
            const dauerSekunden = (stueck / nest) * zeit;
            
            const tage = Math.floor(dauerSekunden / 86400);
            const stunden = Math.floor((dauerSekunden % 86400) / 3600);
            const minuten = Math.floor((dauerSekunden % 3600) / 60);

            let dauerText = "";
            if (tage > 0) dauerText += tage + "d ";
            if (stunden > 0 || tage > 0) dauerText += stunden + "h ";
            dauerText += minuten + "m";

            document.getElementById('resZykStunde').innerText = new Intl.NumberFormat('de-DE', { maximumFractionDigits: 0 }).format(teileProStunde) + " Stk.";
            document.getElementById('resZykDauer').innerText = dauerText;
        }
    </script>
</body>
</html>
