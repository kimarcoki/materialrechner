<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materialrechner Produktion</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; margin: 20px; }
        #app-content { display: none; }
        h2 { color: #333; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        input:disabled { background-color: #f0f0f0; color: #888; cursor: not-allowed; }
        button { width: 100%; padding: 12px; background-color: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .result-box { margin-top: 20px; padding: 15px; background: #eef2ff; border-radius: 8px; border-left: 5px solid #4f46e5; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 17px; }
        .unit { font-weight: bold; color: #4f46e5; }
        hr { border: 0; border-top: 1px solid #cbd5e1; margin: 10px 0; }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <h2>🔒 Login</h2>
    <input type="password" id="passInput" placeholder="Passwort eingeben...">
    <button onclick="checkPassword()">Anmelden</button>
    <p id="error" style="color: red; display: none; text-align: center; margin-top: 10px;">Falsches Passwort!</p>
</div>

<div id="app-content" class="card">
    <h2>Material-Rechner</h2>
    
    <label>Geplante Stückzahl (Stk.)</label>
    <input type="number" id="stueck" value="10000" oninput="calculate()">

    <label>Gewicht pro Stück (Gramm)</label>
    <input type="number" id="gewichtG" value="150" step="0.1" oninput="calculate()">

    <div class="grid">
        <div>
            <label>Trichter LINKS (%)</label>
            <input type="number" id="pLinks" value="70" min="0" max="100" oninput="calculate()">
        </div>
        <div>
            <label>Trichter RECHTS (%)</label>
            <input type="number" id="pRechts" value="30" disabled>
        </div>
    </div>

    <label>Farbe / Additiv (%)</label>
    <input type="number" id="farbeProzent" value="1.5" step="0.1" oninput="calculate()">

    <div class="result-box">
        <div class="result-item">
            <span>Gesamtbedarf:</span>
            <span class="unit" id="resGesamt">0 kg</span>
        </div>
        <hr>
        <div class="result-item">
            <span>Anteil LINKS:</span>
            <span class="unit" id="resLinks">0 kg</span>
        </div>
        <div class="result-item">
            <span>Anteil RECHTS:</span>
            <span class="unit" id="resRechts">0 kg</span>
        </div>
        <div class="result-item">
            <span>Farbe (Additiv):</span>
            <span class="unit" id="resFarbe">0 kg</span>
        </div>
    </div>
    
    <button onclick="location.reload()" style="background: #64748b; margin-top: 20px; font-size: 14px;">Abmelden</button>
</div>

<script>
const MEIN_PASSWORT = "1234"; 

function checkPassword() {
    const input = document.getElementById('passInput').value;
    if(input === MEIN_PASSWORT) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        calculate();
    } else {
        document.getElementById('error').style.display = 'block';
    }
}

document.getElementById('passInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') checkPassword();
});

function calculate() {
    const stueck = parseFloat(document.getElementById('stueck').value) || 0;
    const gewichtGramm = parseFloat(document.getElementById('gewichtG').value) || 0;
    
    // Prozente berechnen
    let pLinks = parseFloat(document.getElementById('pLinks').value);
    if (isNaN(pLinks)) pLinks = 0;
    if (pLinks > 100) pLinks = 100;
    if (pLinks < 0) pLinks = 0;
    
    const pRechts = 100 - pLinks;
    
    // Wert im deaktivierten Feld anzeigen
    document.getElementById('pRechts').value = pRechts;

    const farbeP = parseFloat(document.getElementById('farbeProzent').value) || 0;

    // Gesamtmaterial in kg
    const gesamtMaterialKg = (stueck * gewichtGramm) / 1000;
    
    // Anteile
    const anteilLinks = (gesamtMaterialKg * pLinks) / 100;
    const anteilRechts = (gesamtMaterialKg * pRechts) / 100;
    const farbeKg = gesamtMaterialKg * (farbeP / 100);

    // Anzeige
    document.getElementById('resGesamt').innerText = formatUnit(gesamtMaterialKg);
    document.getElementById('resLinks').innerText = formatUnit(anteilLinks);
    document.getElementById('resRechts').innerText = formatUnit(anteilRechts);
    document.getElementById('resFarbe').innerText = formatUnit(farbeKg);
}

function formatUnit(kg) {
    if (kg >= 1000) {
        return (kg / 1000).toFixed(2) + " t";
    }
    return kg.toFixed(2) + " kg";
}
</script>

</body>
</html>
