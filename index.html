<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produktions-App</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f4f4f9; --text: #333; --dark: #1e293b; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text); }
        
        /* SIDEBAR Overlay */
        #sidebar { 
            position: fixed; left: -260px; top: 0; width: 250px; height: 100%; 
            background: var(--dark); color: white; display: flex; flex-direction: column; 
            padding: 20px; box-sizing: border-box; transition: 0.3s; z-index: 1000;
            box-shadow: 4px 0 10px rgba(0,0,0,0.2);
        }
        #sidebar.open { left: 0; }
        #sidebar h3 { border-bottom: 1px solid #334155; padding-bottom: 10px; margin-top: 10px; }
        
        .nav-item { padding: 12px; cursor: pointer; border-radius: 6px; margin-bottom: 5px; transition: 0.2s; }
        .nav-item:hover { background: #334155; }
        .nav-item.active { background: var(--primary); }

        /* MAIN CONTENT */
        #main { flex-grow: 1; position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        
        /* OVERLAY wenn Menü offen */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 900; }

        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 90%; max-width: 450px; position: relative; }
        
        /* Header Bereich in der Karte */
        .card-header { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; }
        .menu-btn { 
            position: absolute; left: 0; background: var(--dark); color: white; 
            border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; 
            font-size: 18px; display: none; 
        }

        #app-content { display: none; width: 100%; justify-content: center; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        input:disabled { background-color: #f0f0f0; color: #888; }
        
        button.primary-btn { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .result-box { margin-top: 20px; padding: 15px; background: #eef2ff; border-radius: 8px; border-left: 5px solid var(--primary); }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 17px; }
        .unit { font-weight: bold; color: var(--primary); }
        hr { border: 0; border-top: 1px solid #cbd5e1; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <nav id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Menü</h3>
            <span onclick="toggleSidebar()" style="cursor:pointer; font-size: 24px;">&times;</span>
        </div>
        <div class="nav-item active" onclick="toggleSidebar()">Material-Rechner</div>
        <div style="margin-top: auto;">
            <button class="primary-btn" onclick="location.reload()" style="background: #ef4444;">Abmelden</button>
        </div>
    </nav>

    <div id="main">
        <div id="login-screen" class="card">
            <h2 style="text-align: center; margin-top: 0;">🔒 Login</h2>
            <input type="password" id="passInput" placeholder="Passwort eingeben...">
            <button class="primary-btn" onclick="checkPassword()">Anmelden</button>
            <p id="error" style="color: #ef4444; display: none; text-align: center; margin-top: 10px;">Falsches Passwort!</p>
        </div>

        <div id="app-content">
            <div class="card">
                <div class="card-header">
                    <button id="menuBtn" class="menu-btn" onclick="toggleSidebar()">☰</button>
                    <h2 style="margin: 0;">Material-Rechner</h2>
                </div>

                <label>Geplante Stückzahl (Stk.)</label>
                <input type="number" id="stueck" value="10000" oninput="calculate()">
                
                <label>Gewicht pro Stück (Gramm)</label>
                <input type="number" id="gewichtG" value="150" step="0.1" oninput="calculate()">
                
                <div class="grid">
                    <div>
                        <label>Links (%)</label>
                        <input type="number" id="pLinks" value="70" min="0" max="100" oninput="calculate()">
                    </div>
                    <div>
                        <label>Rechts (%)</label>
                        <input type="number" id="pRechts" value="30" disabled>
                    </div>
                </div>
                
                <label>Farbe / Additiv (%)</label>
                <input type="number" id="farbeProzent" value="1.5" step="0.1" oninput="calculate()">
                
                <div class="result-box">
                    <div class="result-item"><span>Gesamtbedarf:</span><span class="unit" id="resGesamt">0 kg</span></div>
                    <hr>
                    <div class="result-item"><span>Anteil LINKS:</span><span class="unit" id="resLinks">0 kg</span></div>
                    <div class="result-item"><span>Anteil RECHTS:</span><span class="unit" id="resRechts">0 kg</span></div>
                    <div class="result-item"><span>Farbe:</span><span class="unit" id="resFarbe">0 kg</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MEIN_PASSWORT = "nucfov-temsut-1Bevka";

        function checkPassword() {
            const input = document.getElementById('passInput').value;
            if(input.trim() === MEIN_PASSWORT) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                document.getElementById('menuBtn').style.display = 'block'; // Zeigt Button erst nach Login
                calculate();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        document.getElementById('passInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            if (sb.classList.contains('open')) {
                sb.classList.remove('open');
                ov.style.display = 'none';
            } else {
                sb.classList.add('open');
                ov.style.display = 'block';
            }
        }

        function calculate() {
            const stueck = parseFloat(document.getElementById('stueck').value) || 0;
            const gewichtGramm = parseFloat(document.getElementById('gewichtG').value) || 0;
            let pLinks = parseFloat(document.getElementById('pLinks').value) || 0;
            if (pLinks > 100) pLinks = 100;
            if (pLinks < 0) pLinks = 0;
            document.getElementById('pRechts').value = 100 - pLinks;

            const gesamtKg = (stueck * gewichtGramm) / 1000;
            const farbeP = parseFloat(document.getElementById('farbeProzent').value) || 0;
            const farbeKg = gesamtKg * (farbeP / 100);

            document.getElementById('resGesamt').innerText = gesamtKg.toFixed(2) + " kg";
            document.getElementById('resLinks').innerText = (gesamtKg * pLinks / 100).toFixed(2) + " kg";
            document.getElementById('resRechts').innerText = (gesamtKg * (100-pLinks) / 100).toFixed(2) + " kg";
            document.getElementById('resFarbe').innerText = farbeKg < 1 ? (farbeKg * 1000).toFixed(0) + " g" : farbeKg.toFixed(2) + " kg";
        }
    </script>
</body>
</html>
