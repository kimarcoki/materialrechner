<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produktions-App v1.4.1</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f4f4f9; --text: #333; --dark: #1e293b; --success: #22c55e; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text); }
        
        .card-version { position: absolute; top: 10px; right: 15px; font-size: 10px; color: #cbd5e1; font-weight: normal; }

        #sidebar { 
            position: fixed; left: -260px; top: 0; width: 250px; height: 100%; 
            background: var(--dark); color: white; display: flex; flex-direction: column; 
            padding: 20px; box-sizing: border-box; transition: 0.3s; z-index: 1000;
            box-shadow: 4px 0 10px rgba(0,0,0,0.2);
        }
        #sidebar.open { left: 0; }
        #sidebar h3 { border-bottom: 1px solid #334155; padding-bottom: 10px; margin-top: 10px; }
        
        .nav-item { padding: 12px; cursor: pointer; border-radius: 6px; margin-bottom: 5px; transition: 0.2s; color: #94a3b8; }
        .nav-item:hover { background: #334155; color: white; }
        .nav-item.active { background: var(--primary); color: white; }

        #main { flex-grow: 1; width: 100%; height: 100%; display: flex; justify-content: center; overflow-y: auto; padding: 10px; box-sizing: border-box; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 900; }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 800px; position: relative; margin-top: 10px; margin-bottom: 30px; }
        .card-header { display: flex; align-items: center; justify-content: center; margin-bottom: 15px; position: relative; }
        .menu-btn { position: absolute; left: 0; background: var(--dark); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 18px; }

        #app-content { display: none; width: 100%; flex-direction: column; align-items: center; }
        .view-section { display: none; width: 100%; }
        .view-section.active { display: block; }

        label { display: block; margin-bottom: 3px; font-weight: bold; color: #555; font-size: 12px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; text-align: center; }
        input:disabled { background-color: #f0f0f0; color: #888; }
        
        button.primary-btn { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        
        /* Grid-Systeme */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        
        /* Hallen-Übersicht Styles */
        .m-row { display: grid; grid-template-columns: 100px 1fr 1fr 1fr 1fr 1.5fr; gap: 10px; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .m-name { font-weight: bold; color: var(--dark); font-size: 14px; }
        .m-res { font-size: 12px; font-weight: bold; color: var(--primary); text-align: right; }
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; margin-top: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); transition: 0.3s; }

        /* Ergebnisse */
        .result-box { margin-top: 10px; padding: 15px; background: #eef2ff; border-radius: 8px; border-left: 5px solid var(--primary); }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 15px; }
        .unit { font-weight: bold; color: var(--primary); }
        hr { border: 0; border-top: 1px solid #cbd5e1; margin: 8px 0; }
        .color-detail { font-size: 13px; color: #444; padding-left: 10px; border-left: 2px solid #cbd5e1; margin-bottom: 3px; }

        @media (max-width: 700px) {
            .m-row { grid-template-columns: 1fr 1fr; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
            .m-name { grid-column: span 2; background: #f8fafc; padding: 5px; text-align: center; }
            .m-res { grid-column: span 2; text-align: center; background: #eef2ff; padding: 8px; border-radius: 4px; margin-top: 5px; }
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <nav id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0;">Menü</h3>
            <span onclick="toggleSidebar()" style="cursor:pointer; font-size: 28px;">&times;</span>
        </div>
        <div style="margin-top: 20px;">
            <div id="nav-hallen" class="nav-item active" onclick="switchView('hallen')">Hallen-Übersicht</div>
            <div id="nav-material" class="nav-item" onclick="switchView('material')">Material-Rechner</div>
            <div id="nav-zyklus" class="nav-item" onclick="switchView('zyklus')">Zyklus-Rechner</div>
        </div>
        <div style="margin-top: auto;">
            <button class="primary-btn" onclick="location.reload()" style="background: #ef4444;">Abmelden</button>
        </div>
    </nav>

    <div id="main">
        <div id="login-screen" class="card" style="max-width: 400px; align-self: center;">
            <div class="card-version">v1.4.1</div>
            <h2 style="text-align: center; margin-top: 0;">🔒 Login</h2>
            <input type="password" id="passInput" placeholder="Passwort...">
            <button class="primary-btn" onclick="checkPassword()">Anmelden</button>
            <p id="error" style="color: #ef4444; display: none; text-align: center; margin-top: 10px;">Falsches Passwort!</p>
        </div>

        <div id="app-content">
            <div id="view-hallen" class="view-section active">
                <div class="card">
                    <div class="card-version">v1.4.1</div>
                    <div class="card-header">
                        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                        <h2 style="margin: 0;">Hallen-Übersicht</h2>
                    </div>
                    <div id="maschinen-liste"></div>
                </div>
            </div>

            <div id="view-material" class="view-section">
                <div class="card" style="max-width: 500px; margin: auto;">
                    <div class="card-version">v1.4.1</div>
                    <div class="card-header">
                        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                        <h2 style="margin: 0;">Material-Rechner</h2>
                    </div>
                    <label>Geplante Stückzahl</label>
                    <input type="number" id="matStk" oninput="calcMaterial()">
                    <label>Gewicht pro Stück (g)</label>
                    <input type="number" id="matGew" step="0.1" oninput="calcMaterial()">
                    <div class="grid-2">
                        <div><label>Links (%)</label><input type="number" id="matPL" oninput="calcMaterial()"></div>
                        <div><label>Rechts (%)</label><input type="number" id="matPR" disabled></div>
                    </div>
                    <label>Farbe (%) gesamt</label>
                    <input type="number" id="matFarbeP" step="0.1" oninput="calcMaterial()">
                    <label>Farbmischung (Teile F1-F4)</label>
                    <div class="grid-4">
                        <input type="number" id="f1" placeholder="F1" oninput="calcMaterial()">
                        <input type="number" id="f2" placeholder="F2" oninput="calcMaterial()">
                        <input type="number" id="f3" placeholder="F3" oninput="calcMaterial()">
                        <input type="number" id="f4" placeholder="F4" oninput="calcMaterial()">
                    </div>
                    <div class="result-box">
                        <div class="result-item"><span>Gesamt:</span><span class="unit" id="resMatGes">0,00 kg</span></div>
                        <hr>
                        <div class="result-item"><span>Links / Rechts:</span><span id="resMatLR">0 / 0 kg</span></div>
                        <div class="result-item"><span>Farbe:</span><span class="unit" id="resMatFarbeGes">0,00 kg</span></div>
                        <div id="resMatFarbeEinzel"></div>
                    </div>
                </div>
            </div>

            <div id="view-zyklus" class="view-section">
                <div class="card" style="max-width: 500px; margin: auto;">
                    <div class="card-version">v1.4.1</div>
                    <div class="card-header">
                        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                        <h2 style="margin: 0;">Zyklus-Rechner</h2>
                    </div>
                    <label>Ziel-Stückzahl</label>
                    <input type="number" id="zykStk" oninput="calcZyklus()">
                    <label>Zykluszeit (s)</label>
                    <input type="number" id="zykZeit" step="0.1" oninput="calcZyklus()">
                    <div class="grid-2">
                        <div><label>Zettel-Nr.</label><input type="number" id="zykZettel" oninput="calcZyklus()"></div>
                        <div><label>Stk/Pal</label><input type="number" id="zykPal" oninput="calcZyklus()"></div>
                    </div>
                    <div class="result-box">
                        <div class="result-item"><span>Teile/Std:</span><span class="unit" id="resZykStd">0 Stk.</span></div>
                        <div class="result-item"><span>Fertig:</span><span id="resZykFertig">0 Stk.</span></div>
                        <hr>
                        <div class="result-item"><span id="lblZyk">Laufzeit:</span><span class="unit" id="resZykDauer">0m</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MEIN_PASSWORT = "nucfov-temsut-1Bevka";

        function checkPassword() {
            if(document.getElementById('passInput').value.trim() === MEIN_PASSWORT) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                initHalle();
                loadOtherCalculators();
            } else { document.getElementById('error').style.display = 'block'; }
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            const isOpen = sb.classList.toggle('open');
            ov.style.display = isOpen ? 'block' : 'none';
        }

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            document.getElementById('nav-' + view).classList.add('active');
            toggleSidebar();
        }

        function formatK(val) { return new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val) + " kg"; }

        // HALLEN-LOGIK
        const M_COUNT = 9;
        let hData = JSON.parse(localStorage.getItem('hDataV141')) || {};

        function initHalle() {
            const list = document.getElementById('maschinen-liste');
            list.innerHTML = "";
            for (let i = 1; i <= M_COUNT; i++) {
                const d = hData[i] || { z: 0, p: 80, s: 10000, t: 25 };
                const row = document.createElement('div');
                row.className = 'm-row';
                row.innerHTML = `
                    <div class="m-name">Maschine ${i}</div>
                    <div><label>Zettel</label><input type="number" value="${d.z}" oninput="updM(${i},'z',this.value)"></div>
                    <div><label>Stk/Pal</label><input type="number" value="${d.p}" oninput="updM(${i},'p',this.value)"></div>
                    <div><label>Soll</label><input type="number" value="${d.s}" oninput="updM(${i},'s',this.value)"></div>
                    <div><label>Zyk(s)</label><input type="number" value="${d.t}" oninput="updM(${i},'t',this.value)"></div>
                    <div class="m-res" id="resM${i}">...</div>
                `;
                list.appendChild(row);
                calcM(i);
            }
        }

        function updM(id, f, v) {
            if(!hData[id]) hData[id] = { z:0, p:0, s:0, t:0 };
            hData[id][f] = parseFloat(v) || 0;
            localStorage.setItem('hDataV141', JSON.stringify(hData));
            calcM(id);
        }

        function calcM(id) {
            const d = hData[id];
            const fert = d.z * d.p;
            const off = d.s - fert;
            const proz = Math.min(100, Math.max(0, (fert/d.s)*100)) || 0;
            let txt = "0m";
            if (off > 0 && d.t > 0) {
                const s = off * d.t;
                const tage = Math.floor(s/86400);
                const std = Math.floor((s%86400)/3600);
                const min = Math.floor((s%3600)/60);
                txt = (tage > 0 ? tage + "t " : "") + std + "h " + min + "m";
            }
            document.getElementById(`resM${id}`).innerHTML = `
                <div>${proz.toFixed(1)}% | Rest: ${txt}</div>
                <div class="progress-bar"><div class="progress-fill" style="width:${proz}%"></div></div>
            `;
        }

        // MATERIAL-RECHNER
        function calcMaterial() {
            const getV = (id) => parseFloat(document.getElementById(id).value) || 0;
            const stk = getV('matStk'), gew = getV('matGew'), fP = getV('matFarbeP');
            let pL = getV('matPL'); if(pL > 100) pL = 100;
            const pR = 100 - pL; document.getElementById('matPR').value = pR;

            const ges = (stk * gew) / 1000;
            const farbeGes = ges * (fP / 100);

            document.getElementById('resMatGes').innerText = formatK(ges);
            document.getElementById('resMatLR').innerText = `${formatK(ges * pL/100)} / ${formatK(ges * pR/100)}`;
            document.getElementById('resMatFarbeGes').innerText = farbeGes < 1 ? (farbeGes*1000).toFixed(1) + " g" : formatK(farbeGes);

            const fSum = getV('f1') + getV('f2') + getV('f3') + getV('f4');
            const einzel = document.getElementById('resMatFarbeEinzel'); einzel.innerHTML = "";
            if(fSum > 0 && farbeGes > 0) {
                ['f1','f2','f3','f4'].forEach((f, i) => {
                    const v = getV(f);
                    if(v > 0) {
                        const ant = (farbeGes / fSum) * v;
                        einzel.innerHTML += `<div class="color-detail">F${i+1}: ${ant < 1 ? (ant*1000).toFixed(1)+"g" : formatK(ant)}</div>`;
                    }
                });
            }
            localStorage.setItem('matStore', JSON.stringify({stk, gew, pL, fP, f1:getV('f1'), f2:getV('f2'), f3:getV('f3'), f4:getV('f4')}));
        }

        // ZYKLUS-RECHNER
        function calcZyklus() {
            const getV = (id) => parseFloat(document.getElementById(id).value) || 0;
            const stk = getV('zykStk'), zeit = getV('zykZeit'), zett = getV('zykZettel'), pal = getV('zykPal');

            if(zeit > 0) {
                document.getElementById('resZykStd').innerText = Math.round(3600/zeit) + " Stk.";
                const fert = zett * pal;
                document.getElementById('resZykFertig').innerText = fert + " Stk.";
                const off = (zett > 0 && pal > 0) ? stk - fert : stk;
                document.getElementById('lblZyk').innerText = (zett > 0 && pal > 0) ? "Restlaufzeit:" : "Laufzeit gesamt:";
                
                const s = Math.max(0, off) * zeit;
                const h = Math.floor(s/3600);
                const m = Math.floor((s%3600)/60);
                document.getElementById('resZykDauer').innerText = (h > 24 ? Math.floor(h/24)+"t " : "") + (h%24)+"h "+m+"m";
            }
            localStorage.setItem('zykStore', JSON.stringify({stk, zeit, zett, pal}));
        }

        function loadOtherCalculators() {
            const mS = JSON.parse(localStorage.getItem('matStore'));
            if(mS) {
                document.getElementById('matStk').value = mS.stk; document.getElementById('matGew').value = mS.gew;
                document.getElementById('matPL').value = mS.pL; document.getElementById('matFarbeP').value = mS.fP;
                document.getElementById('f1').value = mS.f1; document.getElementById('f2').value = mS.f2;
                document.getElementById('f3').value = mS.f3; document.getElementById('f4').value = mS.f4;
                calcMaterial();
            }
            const zS = JSON.parse(localStorage.getItem('zykStore'));
            if(zS) {
                document.getElementById('zykStk').value = zS.stk; document.getElementById('zykZeit').value = zS.zeit;
                document.getElementById('zykZettel').value = zS.zett; document.getElementById('zykPal').value = zS.pal;
                calcZyklus();
            }
        }
    </script>
</body>
</html>
