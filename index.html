<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Produktions-App v1.5.2</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f4f4f9; --text: #333; --dark: #1e293b; --success: #22c55e; }
        
        /* Grund-Setup - Verhindert das Wackeln des gesamten Bodys */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 0;
            display: flex; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            color: var(--text); 
        }
        
        .card-version { position: absolute; top: 10px; right: 15px; font-size: 10px; color: #cbd5e1; }

        /* Sidebar */
        #sidebar { 
            position: fixed; left: -260px; top: 0; width: 250px; height: 100%; 
            background: var(--dark); color: white; display: flex; flex-direction: column; 
            padding: 20px; box-sizing: border-box; transition: 0.3s; z-index: 1000;
        }
        #sidebar.open { left: 0; }
        
        .nav-item { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 8px; color: #94a3b8; font-weight: 500; }
        .nav-item.active { background: var(--primary); color: white; }

        /* Hauptbereich - Hier wurde das Scrolling fixiert */
        #main { 
            flex-grow: 1; 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; /* Flüssiges Scrollen auf iOS */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 900; }

        /* Karten-Design */
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            width: 92%; 
            max-width: 480px; 
            position: relative; 
            margin: 20px auto; 
            box-sizing: border-box;
        }
        .card.wide { max-width: 1000px; margin-top: 40px; } /* Mehr Platz oben für iPhone Notch */

        .card-header { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 25px; 
            position: relative; 
            min-height: 40px;
        }
        
        .menu-btn { 
            position: absolute; 
            left: 0; 
            background: var(--dark); 
            color: white; 
            border: none; 
            padding: 12px 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 20px; 
            z-index: 10;
        }

        #app-content { display: none; width: 100%; flex-direction: column; align-items: center; }
        .view-section { display: none; width: 100%; }
        .view-section.active { display: block; }

        /* Inputs */
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #555; font-size: 13px; }
        input { 
            width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; 
            box-sizing: border-box; font-size: 16px; text-align: center; -webkit-appearance: none; 
        }
        
        button.primary-btn { width: 100%; padding: 15px; background-color: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; }

        /* Hallen-Übersicht */
        .m-row { 
            display: grid; grid-template-columns: 110px 1fr 1fr 1fr 1.2fr 1.8fr; 
            gap: 12px; align-items: end; padding: 15px 0; border-bottom: 1px solid #f1f5f9; 
        }
        .m-name { font-weight: bold; color: var(--dark); font-size: 14px; padding-bottom: 12px; }
        .m-col { display: flex; flex-direction: column; align-items: center; }
        .m-col label { text-align: center; font-size: 10px; color: #64748b; margin-bottom: 4px; }
        .m-res { font-size: 11px; font-weight: bold; color: var(--primary); text-align: right; width: 100%; }
        
        .progress-bar { height: 10px; background: #e2e8f0; border-radius: 5px; margin-top: 6px; overflow: hidden; border: 1px solid #cbd5e1; width: 100%; }
        .progress-fill { height: 100%; background: var(--success); transition: width 0.4s; width: 0%; }

        /* iPhone / Mobile Optimierung */
        @media (max-width: 850px) {
            .m-row { 
                grid-template-columns: 1fr 1fr; gap: 12px; 
                background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; 
                padding: 15px; margin-bottom: 20px; 
            }
            .m-name { grid-column: span 2; text-align: center; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0; margin-bottom: 10px; font-size: 16px; }
            .m-res-wrapper { grid-column: span 2; margin-top: 8px; }
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .result-box { margin-top: 15px; padding: 15px; background: #eef2ff; border-radius: 10px; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <nav id="sidebar">
        <h3 style="margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px;">Menü</h3>
        <div id="nav-hallen" class="nav-item active" onclick="switchView('hallen')">Hallen-Übersicht</div>
        <div id="nav-material" class="nav-item" onclick="switchView('material')">Material-Rechner</div>
        <div id="nav-zyklus" class="nav-item" onclick="switchView('zyklus')">Zyklus-Rechner</div>
        <div style="margin-top: auto;"><button class="primary-btn" onclick="location.reload()" style="background: #ef4444;">Abmelden</button></div>
    </nav>

    <div id="main">
        <div id="login-screen" class="card">
            <h2 style="text-align: center; margin-bottom: 25px;">🔒 Login</h2>
            <input type="password" id="passInput" placeholder="Passwort eingeben...">
            <button class="primary-btn" onclick="checkPassword()">Anmelden</button>
            <p id="error" style="color: #ef4444; display: none; text-align: center; margin-top: 15px;">Falsches Passwort!</p>
        </div>

        <div id="app-content">
            <div id="view-hallen" class="view-section active">
                <div class="card wide">
                    <div class="card-version">v1.5.2</div>
                    <div class="card-header">
                        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                        <h2 style="margin: 0;">Hallen-Übersicht</h2>
                    </div>
                    <div id="maschinen-liste"></div>
                    <div style="height: 40px;"></div> </div>
            </div>

            <div id="view-material" class="view-section">
                <div class="card">
                    <div class="card-header"><button class="menu-btn" onclick="toggleSidebar()">☰</button><h2>Material</h2></div>
                    <label>Stückzahl</label><input type="number" id="stueck" oninput="calculateMaterial()">
                    <label>Gewicht (g)</label><input type="number" id="gewichtG" step="0.1" oninput="calculateMaterial()">
                    <div class="grid">
                        <div><label>Links (%)</label><input type="number" id="pLinks" oninput="calculateMaterial()"></div>
                        <div><label>Rechts (%)</label><input type="number" id="pRechts" disabled></div>
                    </div>
                    <label>Farbe (%)</label><input type="number" id="farbeProzent" step="0.1" oninput="calculateMaterial()">
                    <div class="result-box">
                        <div class="result-item"><span>Gesamt:</span><span class="unit" id="resGesamt">0,00 kg</span></div>
                        <div class="result-item"><span>Farbe:</span><span class="unit" id="resFarbeGes">0,00 kg</span></div>
                    </div>
                </div>
            </div>

            <div id="view-zyklus" class="view-section">
                <div class="card">
                    <div class="card-header"><button class="menu-btn" onclick="toggleSidebar()">☰</button><h2>Zyklus</h2></div>
                    <label>Gesamt Stück</label><input type="number" id="zykStueck" oninput="calculateZyklus()">
                    <label>Zykluszeit (s)</label><input type="number" id="zykZeit" step="0.1" oninput="calculateZyklus()">
                    <div class="grid">
                        <div><label>Zettel-Nr.</label><input type="number" id="zykZettel" oninput="calculateZyklus()"></div>
                        <div><label>Stk/Pal</label><input type="number" id="zykProPalette" oninput="calculateZyklus()"></div>
                    </div>
                    <div class="result-box">
                        <div class="result-item"><span>Teile/h:</span><span class="unit" id="resZykStunde">0 Stk.</span></div>
                        <div class="result-item"><span id="labelLaufzeit">Restlaufzeit:</span><span class="unit" id="resZykDauer">0m</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MEIN_PASSWORT = "nucfov-temsut-1Bevka";
        let hData = JSON.parse(localStorage.getItem('hDataV152')) || {};

        function initHalle() {
            const container = document.getElementById('maschinen-liste');
            if(!container) return;
            container.innerHTML = "";
            for (let i = 1; i <= 9; i++) {
                if(!hData[i]) hData[i] = { z: 0, p: 80, s: 10000, t: 25 };
                const d = hData[i];
                const row = document.createElement('div');
                row.className = 'm-row';
                row.innerHTML = `
                    <div class="m-name">Maschine ${i}</div>
                    <div class="m-col"><label>Zettel</label><input type="number" class="m-input" value="${d.z}" oninput="updateM(${i},'z',this.value)"></div>
                    <div class="m-col"><label>Stk/Pal</label><input type="number" class="m-input" value="${d.p}" oninput="updateM(${i},'p',this.value)"></div>
                    <div class="m-col"><label>Ziel</label><input type="number" class="m-input" value="${d.s}" oninput="updateM(${i},'s',this.value)"></div>
                    <div class="m-col"><label>Zyklus (s)</label><input type="number" class="m-input" value="${d.t}" oninput="updateM(${i},'t',this.value)"></div>
                    <div class="m-res-wrapper">
                        <div class="m-res" id="resM${i}">0% | Rest: 0m</div>
                        <div class="progress-bar"><div class="progress-fill" id="fillM${i}" style="width:0%"></div></div>
                    </div>`;
                container.appendChild(row);
                calcM(i);
            }
        }

        function updateM(id, f, v) {
            hData[id][f] = parseFloat(v) || 0;
            localStorage.setItem('hDataV152', JSON.stringify(hData));
            calcM(id);
        }

        function calcM(id) {
            const d = hData[id];
            const fert = d.z * d.p;
            const prozent = Math.min(100, (fert / (d.s || 1)) * 100);
            const offen = d.s - fert;
            let tTxt = "0m";
            if(offen > 0 && d.t > 0) {
                const s = offen * d.t;
                const tage = Math.floor(s/86400), h = Math.floor((s%86400)/3600), m = Math.floor((s%3600)/60);
                tTxt = (tage > 0 ? tage + "d " : "") + (h > 0 ? h + "h " : "") + m + "m";
            }
            document.getElementById(`resM${id}`).innerText = `${prozent.toFixed(1)}% | Rest: ${tTxt}`;
            document.getElementById(`fillM${id}`).style.width = `${prozent}%`;
        }

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            document.getElementById('nav-' + view).classList.add('active');
            if(window.innerWidth < 850) toggleSidebar(); 
            if(view === 'hallen') initHalle();
            document.getElementById('main').scrollTop = 0; // Nach oben springen beim Wechsel
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            const isOpen = sb.classList.toggle('open');
            ov.style.display = isOpen ? 'block' : 'none';
        }

        function checkPassword() {
            if(document.getElementById('passInput').value.trim() === MEIN_PASSWORT) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
                initHalle();
            } else { document.getElementById('error').style.display = 'block'; }
        }

        /* Material/Zyklus Logik (identisch v1.3.3) */
        function formatNum(v, u) { return new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2 }).format(v) + " " + u; }
        function calculateMaterial() {
            const val = (id) => parseFloat(document.getElementById(id).value) || 0;
            const s = val('stueck'), g = val('gewichtG'), pL = val('pLinks'), fP = val('farbeProzent');
            document.getElementById('pRechts').value = 100 - pL;
            const ges = (s * g) / 1000;
            document.getElementById('resGesamt').innerText = formatNum(ges, "kg");
            document.getElementById('resFarbeGes').innerText = formatNum(ges * (fP/100), "kg");
        }
        function calculateZyklus() {
            const val = (id) => parseFloat(document.getElementById(id).value) || 0;
            const s = val('zykStueck'), t = val('zykZeit'), z = val('zykZettel'), p = val('zykProPalette');
            if (t <= 0) return;
            document.getElementById('resZykStunde').innerText = Math.round(3600/t).toLocaleString('de-DE') + " Stk.";
            const restS = (s - (z*p)) * t;
            const h = Math.floor(restS/3600), m = Math.floor((restS%3600)/60);
            document.getElementById('resZykDauer').innerText = h + "h " + m + "m";
        }
    </script>
</body>
</html>
