<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materialrechner Login</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        #app-content { display: none; } /* Versteckt die App bis zum Login */
        h2 { color: #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        .result-box { margin-top: 25px; padding: 15px; background: #eef2ff; border-radius: 8px; border-left: 5px solid #4f46e5; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 17px; }
        .unit { font-weight: bold; color: #4f46e5; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <h2>🔒 Login</h2>
    <input type="password" id="passInput" placeholder="Passwort eingeben...">
    <button onclick="checkPassword()">Anmelden</button>
    <p id="error" style="color: red; display: none; text-align: center;">Falsches Passwort!</p>
</div>

<div id="app-content" class="card">
    <h2>Material-Rechner</h2>
    
    <div style="margin-bottom: 15px;">
        <label>Anzahl Stücke</label>
        <input type="number" id="stueck" value="10000" oninput="calculate()">
    </div>

    <div style="margin-bottom: 15px;">
        <label>Gewicht pro Stück (g)</label>
        <input type="number" id="gewicht" value="1500" step="1" oninput="calculate()">
    </div>

    <div class="grid">
        <div>
            <label>Links</label>
            <input type="number" id="vLinks" value="1" oninput="calculate()">
        </div>
        <div>
            <label>Rechts</label>
            <input type="number" id="vRechts" value="2" oninput="calculate()">
        </div>
    </div>

    <div style="margin-bottom: 15px;">
        <label>Farbe / Additiv (%)</label>
        <input type="number" id="farbeProzent" value="1.5" step="0.1" oninput="calculate()">
    </div>

    <div class="result-box">
        <div class="result-item"><span>Gesamt:</span><span class="unit" id="resGesamt">0 kg</span></div>
        <div class="result-item"><span>Links:</span><span class="unit" id="resLinks">0 kg</span></div>
        <div class="result-item"><span>Rechts:</span><span class="unit" id="resRechts">0 kg</span></div>
        <div class="result-item"><span>Farbe:</span><span class="unit" id="resFarbe">0 kg</span></div>
    </div>
    <button onclick="location.reload()" style="background: #666; margin-top: 10px;">Logout</button>
</div>

<script>
// HIER DEIN PASSWORT ÄNDERN:
const MEIN_PASSWORT = "1234"; 

function checkPassword() {
    const input = document.getElementById('passInput').value;
    if(input === MEIN_PASSWORT) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        calculate();
    } else {
        document.getElementById('error').style.display = 'block';
    }
}

function calculate() {
    const stueck = parseFloat(document.getElementById('stueck').value) || 0;
    const gewicht = parseFloat(document.getElementById('gewicht').value) || 0;
    const vLinks = parseFloat(document.getElementById('vLinks').value) || 0;
    const vRechts = parseFloat(document.getElementById('vRechts').value) || 0;
    const farbeP = parseFloat(document.getElementById('farbeProzent').value) || 0;

    // Gewicht von Gramm zu Kilogramm konvertieren
    const gewichtKg = gewicht / 1000;
    const gesamtMaterial = stueck * gewichtKg;
    const summe = vLinks + vRechts;
    
    let aLinks = summe > 0 ? (gesamtMaterial / summe) * vLinks : 0;
    let aRechts = summe > 0 ? (gesamtMaterial / summe) * vRechts : 0;
    const farbeKg = gesamtMaterial * (farbeP / 100);

    document.getElementById('resGesamt').innerText = formatKg(gesamtMaterial);
    document.getElementById('resLinks').innerText = formatKg(aLinks);
    document.getElementById('resRechts').innerText = formatKg(aRechts);
    document.getElementById('resFarbe').innerText = formatKg(farbeKg);
}

function formatKg(wert) {
    return wert >= 1000 ? (wert / 1000).toFixed(2) + " t" : wert.toFixed(2) + " kg";
}
</script>

</body>
</html>
